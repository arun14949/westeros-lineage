<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House of Westeros</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Newsreader:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f0e8;
        transition: opacity 0.4s ease;
      }
      #loading-screen .lottie-container {
        width: 120px;
        height: 120px;
        opacity: 0.7;
      }
      #loading-screen h1 {
        font-family: 'Cinzel Decorative', serif;
        font-size: 18px;
        font-weight: 700;
        color: #3a3633;
        letter-spacing: 0.1em;
        margin-top: 16px;
        text-transform: uppercase;
      }
      #loading-screen p {
        font-family: 'Cinzel', serif;
        font-size: 10px;
        color: #3a363399;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen: visible instantly, removed after React mounts -->
    <div id="loading-screen">
      <div class="lottie-container" id="lottie-target"></div>
      <h1>Westeros</h1>
      <p>Loading the realm</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script>
      if (typeof lottie !== 'undefined') {
        lottie.loadAnimation({
          container: document.getElementById('lottie-target'),
          renderer: 'svg',
          loop: true,
          autoplay: true,
          path: '/horse-run.json'
        });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
